services:
  - type: web
    name: lexrag
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn src.api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: HF_HUB_DISABLE_SYMLINKS_WARNING
        value: "1"
      - key: HF_TOKEN
        sync: false
      - key: OPENAI_API_KEY
        sync: false
    healthCheckPath: /api/stats
