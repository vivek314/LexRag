# nginx.conf — High-performance reverse proxy for LexRAG frontend gateway

server {
    listen 80;
    server_name localhost;

    # Allow PDF file uploads up to 50MB (overrides Nginx default 1MB cap)
    client_max_body_size 50M;

    # Serve static SPA frontend
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Explicit routing for static subfolder assets
    location /static/ {
        root /usr/share/nginx/html;
        autoindex off;
    }

    # Proxy API calls to FastAPI backend service
    location /api/ {
        # 'backend' matches the hostname defined in docker-compose.yml
        proxy_pass http://backend:8000/api/;
        
        # Standard proxy headers for host and client IP tracking
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Keep-Alive connection tuning
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        # Increase timeouts to support slow LLM responses or index rebuilds of large PDFs
        proxy_read_timeout 300s;
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
    }
}
